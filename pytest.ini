[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    slow: exercises the full real DailyETLMain.dtsx or full corpus parse rather than a fixture
    integration: exercises multiple accelerator modules together (parser -> inventory -> graph -> conversion)
    regression: pins a specific previously-found bug or documents a known, deliberately-unfixed gap

addopts =
    --strict-markers
    -ra

filterwarnings =
    error
