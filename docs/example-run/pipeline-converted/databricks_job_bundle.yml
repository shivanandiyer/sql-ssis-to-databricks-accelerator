            - task_key: get_last_city_etl_cutoff_time
          notebook_task:
            notebook_path: "./ssis_tasks/extract_updated_city_data_to_staging.py"
            base_parameters:
              entity: "City"
          max_retries: 1
          timeout_seconds: 3600
        - task_key: get_last_city_etl_cutoff_time
