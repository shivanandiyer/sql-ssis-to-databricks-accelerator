        - task_key: calculate_etl_cutoff_time_backup
          description: "Converted from SSIS task 'Calculate ETL Cutoff Time backup' (SSIS_EXPRESSION)"
          notebook_task:
            notebook_path: "./ssis_tasks/calculate_etl_cutoff_time_backup.py"
            base_parameters:
              entity: "unknown"
          max_retries: 1
          timeout_seconds: 3600
        - task_key: ensure_date_dimension_includes_current_year
          description: "Converted from SSIS task 'Ensure Date Dimension includes current year' (SSIS_EXECUTE_SQL)"
          sql_task:
            warehouse_id: "<TODO: SQL warehouse id>"
            file:
              path: "databricks_sql/ensure_date_dimension_includes_current_year.sql"
          max_retries: 1
          timeout_seconds: 3600
        - task_key: extract_updated_city_data_to_staging
          description: "Converted from SSIS task 'Extract Updated City Data to Staging' (SSIS_DATA_FLOW)"
