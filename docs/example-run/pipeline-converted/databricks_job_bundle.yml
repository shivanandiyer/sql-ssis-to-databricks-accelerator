# Databricks Asset Bundle resource definition
# Generated by the WWI Modernisation Accelerator's SSIS conversion layer.
bundle:
  name: wwi-modernisation

resources:
  jobs:
    wwi_dailyetlmain:
      name: wwi_dailyetlmain
      description: "Converted from SSIS package DailyETLMain"
      schedule:
        quartz_cron_expression: "0 0 2 * * ?"
        timezone_id: "UTC"
        pause_status: UNPAUSED
      email_notifications:
        on_failure:
          - "<TODO: distribution list>"
