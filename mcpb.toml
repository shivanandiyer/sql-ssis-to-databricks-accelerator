[package]
name = "sql-ssis-databricks-accelerator"
version = "1.0.0"
description = "Modernise SQL Server / SSIS / Synapse codebases to Databricks"
author = "shivanandiyer"
license = "MIT"
repository = "https://github.com/shivanandiyer/sql-ssis-databricks-accelerator"
tags = ["databricks", "ssis", "sql-server", "synapse", "migration"]

[server]
entry = "mcp/server.py"
transport = "stdio"
python = ">=3.11"

[dependencies]
pip = "requirements.txt"

[distribution]
include = [
  "accelerator/**",
  "mcp/**",
  "skills/**",
  "CLAUDE.md",
  "README.md",
  "requirements.txt"
]
exclude = [
  "output/**",
  "bundle/**",
  "tests/fixtures/**",
  ".git/**",
  "__pycache__/**",
  "*.pyc"
]
