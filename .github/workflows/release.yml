name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write   # needed to create the GitHub release
  id-token: write    # needed for PyPI trusted publishing, if configured

jobs:
  test:
    name: Full test suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dev dependencies
        run: pip install -e ".[dev]"
      - name: ruff check
        run: ruff check accelerator/ run_*.py deploy/ tests/ bundle/src/
      - name: mypy
        run: >
          mypy accelerator/
          run_analysis.py run_impact_analysis.py run_target_state_design.py
          run_conversion.py run_ssis_conversion.py run_test_matrix.py run_validation.py
      - name: pytest
        run: |
          pytest tests/ -v
          pytest bundle/src/tests/ -v

  build:
    name: Build Python package
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tooling
        run: pip install build
      - name: Verify tag matches package version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match pyproject.toml version ($PKG_VERSION)"
            exit 1
          fi
      - name: Build sdist and wheel
        run: python -m build
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # Only attempt a publish if a PyPI token has actually been configured for
    # this repository — lets the release workflow run end-to-end (build +
    # GitHub release) on a fork or before PyPI is set up, without failing.
    if: ${{ vars.PUBLISH_TO_PYPI == 'true' }}
    environment:
      name: pypi
      url: https://pypi.org/p/sql-ssis-to-databricks-accelerator
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Uses PyPI Trusted Publishing (OIDC) by default — no token needed if
        # the project is configured for it on pypi.org. Falls back to the
        # PYPI_API_TOKEN secret if set instead.
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

  github-release:
    name: Create GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history, needed for auto-generated release notes
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
