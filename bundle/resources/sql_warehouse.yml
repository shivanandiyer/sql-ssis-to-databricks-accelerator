# Serverless SQL warehouse used by all sql_task entries in wwi_daily_etl_main.
#
# Recommendation: Serverless, not classic/pro clusters.
#   - Workload is bursty (one ~30-60 min daily batch window), not continuous —
#     serverless avoids paying for idle cluster time between runs.
#   - Object sizes in this corpus (WWI reference data: low-millions of rows
#     per table at most) don't need a dedicated always-on warehouse.
#   - Serverless starts in seconds, which matters for a job with 53 short
#     Execute-SQL-style tasks — classic warehouse cold-start latency would be
#     paid repeatedly across the task graph if tasks ever ran on separate
#     warehouses.
# Tradeoff: serverless SQL warehouses are region-availability-gated and have
# slightly less granular cost/networking control (no customer-managed VPC)
# than classic warehouses — acceptable for this workload, revisit if a future
# compliance requirement mandates customer-managed networking.
resources:
  sql_warehouses:
    wwi_warehouse:
      name: wwi-modernisation-${bundle.target}
      cluster_size: "2X-Small"
      warehouse_type: PRO
      enable_serverless_compute: true
      auto_stop_mins: 10
      min_num_clusters: 1
      max_num_clusters: 2
      tags:
        project: wwi-modernisation
